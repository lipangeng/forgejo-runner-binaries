name: Sync upstream Forgejo Runner tag

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-upstream-forgejo-runner
  cancel-in-progress: false

jobs:
  check-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Get latest upstream tag
        id: upstream
        shell: bash
        run: |
          set -euo pipefail

          UPSTREAM_REPO="https://code.forgejo.org/forgejo/runner.git"

          LATEST_TAG="$(
            git ls-remote --tags --refs "${UPSTREAM_REPO}" \
              | awk '{print $2}' \
              | sed 's#refs/tags/##' \
              | sort -V \
              | tail -n 1
          )"

          if [ -z "${LATEST_TAG}" ]; then
            echo "Failed to detect latest upstream tag"
            exit 1
          fi

          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Latest upstream tag: ${LATEST_TAG}"

      - name: Check whether tag already exists locally
        id: local_tag
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.upstream.outputs.latest_tag }}"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists in current repository."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} does not exist in current repository."
          fi

      - name: Check whether release already exists
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.upstream.outputs.latest_tag }}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${TAG} already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release ${TAG} does not exist yet."
          fi

      - name: Trigger build workflow
        if: steps.release_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.upstream.outputs.latest_tag }}"

          gh workflow run build-release.yml \
            -f tag="${TAG}"

          echo "Triggered build-release.yml for tag ${TAG}"
